<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>せどり利益計算機</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --border: #e0e0e6;
    --text: #1a1a1f;
    --muted: #6b6b75;
    --accent: #bf0000;
    --mercari: #ff0211;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 16px;
    line-height: 1.6;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 8px 0 16px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card h2 {
    font-size: 14px;
    margin: 0 0 12px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin: 8px 0 4px;
  }
  input[type="text"], input[type="number"], input[type="url"], input[type="password"], select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    background: #fff;
    color: var(--text);
  }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-rakuten { background: var(--accent); color: #fff; }
  .btn-mercari { background: var(--mercari); color: #fff; }
  .btn-calc {
    background: #1a1a1f; color: #fff;
    width: 100%; padding: 14px; font-size: 16px; margin-top: 8px;
  }
  .status { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 16px; word-break: break-all; }
  .status.error { color: var(--accent); }
  .status.success { color: #008060; }
  details { margin-top: 8px; }
  summary { cursor: pointer; font-size: 13px; color: var(--muted); padding: 4px 0; }
  .result-card {
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-top: 12px;
    color: #fff;
  }
  .result-card .verdict { font-size: 28px; font-weight: 700; margin: 0 0 4px; }
  .result-card .profit { font-size: 36px; font-weight: 700; margin: 8px 0; }
  .result-card .rate { font-size: 18px; opacity: 0.9; }
  .breakdown {
    background: #fafafa;
    border-radius: 8px;
    padding: 12px;
    margin-top: 12px;
    font-size: 13px;
  }
  .breakdown-row { display: flex; justify-content: space-between; padding: 3px 0; }
  .breakdown-row.total {
    border-top: 1px solid var(--border);
    margin-top: 6px;
    padding-top: 8px;
    font-weight: 700;
  }
  .grade-loss { background: #c43f3f; }
  .grade-thin { background: #d49524; }
  .grade-good { background: #2a9d54; }
  .grade-excellent { background: linear-gradient(135deg, #6b46c1, #2a9d54); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>せどり利益計算機</h1>

  <div class="card">
    <h2>⚙️ 楽天APIキー (初回のみ)</h2>
    <details id="apiKeyDetails">
      <summary id="apiKeyStatus">未設定 — クリックして設定</summary>
      <label>アプリケーションID (applicationId)</label>
      <input type="text" id="apiKey" placeholder="UUID形式のID" autocomplete="off">
      <label>アクセスキー (accessKey)</label>
      <input type="password" id="accessKey" placeholder="楽天で発行されたアクセスキー" autocomplete="off">
      <p class="hint">
        <a href="https://webservice.rakuten.co.jp/app/create" target="_blank" rel="noopener">こちら</a>から無料で発行。<strong>両方必須</strong>(2026年2月の仕様変更)。ブラウザに保存されます。
      </p>
      <button type="button" class="btn-rakuten" id="saveApiKey">保存</button>
      <div class="status" id="saveStatus"></div>
    </details>
  </div>

  <div class="card">
    <h2>🛒 楽天市場(仕入れ)</h2>
    <label>商品URL</label>
    <div class="row">
      <input type="url" id="rakutenUrl" placeholder="https://item.rakuten.co.jp/...">
      <button class="btn-rakuten" id="fetchRakuten" style="flex: 0 0 auto;">取得</button>
    </div>
    <div class="status" id="rakutenStatus"></div>

    <div class="row">
      <div>
        <label>仕入値 (円)</label>
        <input type="number" id="purchasePrice" min="0" step="1">
      </div>
      <div>
        <label>楽天送料 (円)</label>
        <input type="number" id="rakutenShipping" min="0" step="1" value="0">
      </div>
    </div>
    <label>ポイント還元 (%)</label>
    <input type="number" id="pointRate" min="0" step="0.5" value="1">
    <p class="hint">SPUやお買い物マラソンを含めた実質還元率。デフォルト1%</p>
  </div>

  <div class="card">
    <h2>📦 メルカリ(売却)</h2>
    <label>商品名 (相場検索用)</label>
    <div class="row">
      <input type="text" id="productName" placeholder="商品名を入力">
      <button class="btn-mercari" id="searchMercari" style="flex: 0 0 auto;">相場検索</button>
    </div>
    <p class="hint">クリックでメルカリの「売却済み」検索が新タブで開きます</p>

    <label>想定売値 (円)</label>
    <input type="number" id="sellPrice" min="0" step="1">

    <label>メルカリ送料 (円)</label>
    <select id="mercariShipping">
      <option value="0">送料込み(購入者負担) — 0円</option>
      <option value="210" selected>ネコポス — 210円</option>
      <option value="230">ゆうパケット — 230円</option>
      <option value="450">宅急便コンパクト — 450円</option>
      <option value="750">宅急便60サイズ — 750円</option>
      <option value="850">宅急便80サイズ — 850円</option>
      <option value="1050">宅急便100サイズ — 1,050円</option>
    </select>
  </div>

  <button class="btn-calc" id="calculate">利益を計算</button>

  <div id="result"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const yen = (n) => '¥' + Math.round(n).toLocaleString();

const RAKUTEN_API = 'https://openapi.rakuten.co.jp/ichibams/api/IchibaItem/Search/20260401';

function loadApiKey() {
  let appId = '', accessKey = '';
  try {
    appId = localStorage.getItem('rakutenAppId') || '';
    accessKey = localStorage.getItem('rakutenAccessKey') || '';
  } catch {}
  $('apiKey').value = appId;
  $('accessKey').value = accessKey;
  if (appId && accessKey) {
    $('apiKeyStatus').textContent = '✓ 設定済み (' + appId.slice(0, 8) + '…) — クリックして変更';
  } else if (appId || accessKey) {
    $('apiKeyStatus').textContent = '⚠️ 片方のみ設定 — 両方必須です';
  }
}

$('saveApiKey').addEventListener('click', () => {
  const saveStatus = $('saveStatus');
  const appId = $('apiKey').value.trim();
  const accessKey = $('accessKey').value.trim();
  if (!appId || !accessKey) {
    saveStatus.textContent = '✗ アプリID と アクセスキー の両方を入力してください';
    saveStatus.className = 'status error';
    return;
  }
  try {
    localStorage.setItem('rakutenAppId', appId);
    localStorage.setItem('rakutenAccessKey', accessKey);
    $('apiKeyStatus').textContent = '✓ 設定済み (' + appId.slice(0, 8) + '…) — クリックして変更';
    saveStatus.textContent = '✓ 保存しました';
    saveStatus.className = 'status success';
    setTimeout(() => { $('apiKeyDetails').open = false; }, 600);
  } catch (e) {
    saveStatus.textContent = '✗ 保存失敗: ' + e.message + ' (シークレットモード/Cookie無効の可能性)';
    saveStatus.className = 'status error';
  }
});

function parseRakutenUrl(url) {
  const m = url.match(/item\.rakuten\.co\.jp\/([^/]+)\/([^/?#]+)/);
  if (!m) return null;
  return { shopCode: m[1], itemCode: m[2] };
}

async function fetchRakutenItem(url) {
  let appId, accessKey;
  try {
    appId = localStorage.getItem('rakutenAppId');
    accessKey = localStorage.getItem('rakutenAccessKey');
  } catch {}
  if (!appId || !accessKey) throw new Error('先に楽天APIキー(アプリID + アクセスキー)を設定してください');

  const parsed = parseRakutenUrl(url);
  if (!parsed) throw new Error('楽天市場のURLとして認識できません');

  const itemCodeValue = `${encodeURIComponent(parsed.shopCode)}:${encodeURIComponent(parsed.itemCode)}`;
  const queryParts = [
    `applicationId=${encodeURIComponent(appId)}`,
    `accessKey=${encodeURIComponent(accessKey)}`,
    `itemCode=${itemCodeValue}`,
    `format=json`,
    `formatVersion=2`,
    `elements=${encodeURIComponent('itemName,itemPrice,itemUrl,mediumImageUrls,shopName,itemCode,pointRate')}`,
  ];
  const apiUrl = `${RAKUTEN_API}?${queryParts.join('&')}`;

  let res, text;
  try {
    res = await fetch(apiUrl);
    text = await res.text();
  } catch (e) {
    throw new Error(`通信エラー: ${e.message} (CORSまたはネットワーク不通の可能性)`);
  }

  let data = null;
  try { data = JSON.parse(text); } catch {}

  if (!res.ok) {
    const apiMsg = data?.error_description || data?.error || '';
    const bodyPreview = text ? text.slice(0, 300) : '(空のレスポンス)';
    let hint = '';
    switch (res.status) {
      case 400:
        hint = 'リクエストパラメータ不正。商品コード形式やAPIバージョンを確認してください';
        break;
      case 401:
        hint = '認証エラー。アクセスキーが正しいか確認してください';
        break;
      case 403:
        hint = 'アクセス拒否。楽天管理画面の「許可されたWebサイト」に現在のドメインが登録されているか確認してください';
        break;
      case 429:
        hint = 'レート制限超過。しばらく待ってから再試行してください(1QPS以下)';
        break;
      default:
        hint = '楽天APIから予期しない応答';
    }
    throw new Error(`HTTP ${res.status} — ${hint}\n[API応答] ${apiMsg || bodyPreview}`);
  }

  if (data?.error) {
    throw new Error(`楽天API: ${data.error} ${data.error_description || ''}`);
  }
  if (!data?.Items || data.Items.length === 0) {
    throw new Error('商品が見つかりませんでした(URLや商品コードを確認してください)');
  }

  const item = data.Items[0];
  return {
    name: item.itemName,
    price: item.itemPrice,
    pointRate: item.pointRate || 1,
  };
}

$('fetchRakuten').addEventListener('click', async () => {
  const url = $('rakutenUrl').value.trim();
  const status = $('rakutenStatus');
  if (!url) { status.textContent = 'URLを入力してください'; status.className = 'status error'; return; }

  status.textContent = '取得中…';
  status.className = 'status';
  $('fetchRakuten').disabled = true;

  try {
    const item = await fetchRakutenItem(url);
    $('purchasePrice').value = item.price;
    $('pointRate').value = item.pointRate;
    if (!$('productName').value) $('productName').value = item.name.slice(0, 40);
    status.textContent = `✓ 取得完了: ${item.name.slice(0, 30)}…`;
    status.className = 'status success';
  } catch (e) {
    status.innerHTML = '✗ ' + e.message.replace(/\n/g, '<br>');
    status.className = 'status error';
  } finally {
    $('fetchRakuten').disabled = false;
  }
});

$('searchMercari').addEventListener('click', () => {
  const name = $('productName').value.trim();
  if (!name) { alert('商品名を入力してください'); return; }
  const url = `https://jp.mercari.com/search?keyword=${encodeURIComponent(name)}&status=sold_out&order=desc&sort=created_time`;
  window.open(url, '_blank', 'noopener');
});

function gradeProfit(rate) {
  if (rate < 0)    return { label: '🔴 損切り案件', cls: 'grade-loss' };
  if (rate < 0.10) return { label: '🟡 微益(見送り推奨)', cls: 'grade-thin' };
  if (rate < 0.20) return { label: '🟢 良案件', cls: 'grade-good' };
  return { label: '💎 即仕入れ案件', cls: 'grade-excellent' };
}

$('calculate').addEventListener('click', () => {
  const purchase = +$('purchasePrice').value || 0;
  const rakShip = +$('rakutenShipping').value || 0;
  const pointRate = +$('pointRate').value || 0;
  const sell = +$('sellPrice').value || 0;
  const merShip = +$('mercariShipping').value || 0;

  if (purchase <= 0 || sell <= 0) {
    $('result').innerHTML = '<div class="card" style="color: var(--accent)">仕入値と売値を入力してください</div>';
    return;
  }

  const points = Math.floor(purchase * pointRate / 100);
  const realCost = purchase + rakShip - points;
  const merFee = Math.floor(sell * 0.10);
  const profit = sell - merFee - merShip - realCost;
  const rate = profit / sell;
  const grade = gradeProfit(rate);

  $('result').innerHTML = `
    <div class="result-card ${grade.cls}">
      <div class="verdict">${grade.label}</div>
      <div class="profit">${profit >= 0 ? '+' : ''}${yen(profit)}</div>
      <div class="rate">利益率 ${(rate * 100).toFixed(1)}%</div>
    </div>
    <div class="card">
      <h2>📊 内訳</h2>
      <div class="breakdown">
        <div class="breakdown-row"><span>メルカリ売値</span><span>${yen(sell)}</span></div>
        <div class="breakdown-row"><span>− メルカリ手数料 (10%)</span><span>−${yen(merFee)}</span></div>
        <div class="breakdown-row"><span>− メルカリ送料</span><span>−${yen(merShip)}</span></div>
        <div class="breakdown-row"><span>− 楽天仕入値</span><span>−${yen(purchase)}</span></div>
        <div class="breakdown-row"><span>− 楽天送料</span><span>−${yen(rakShip)}</span></div>
        <div class="breakdown-row"><span>+ 楽天ポイント (${pointRate}%)</span><span>+${yen(points)}</span></div>
        <div class="breakdown-row total"><span>利益</span><span>${profit >= 0 ? '+' : ''}${yen(profit)}</span></div>
      </div>
    </div>
  `;
  $('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

loadApiKey();
</script>
</body>
</html>
